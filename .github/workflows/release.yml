name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build distributables (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distributables (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build distributables (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload Windows installer as artifact for downstream jobs
      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/Squad-Center-Setup-*.exe
          retention-days: 1

  # ─── Publish to package managers ──────────────────────────────
  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-chocolatey:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Compute installer checksum
        id: checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem release/Squad-Center-Setup-*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
          echo "SHA256=$hash" >> $env:GITHUB_OUTPUT

      - name: Update Chocolatey package version and checksum
        shell: pwsh
        run: |
          .\chocolatey\update.ps1 -Version "${{ steps.version.outputs.VERSION }}" -Checksum "${{ steps.checksum.outputs.SHA256 }}"

      - name: Pack and push Chocolatey package
        shell: pwsh
        run: |
          choco pack chocolatey\squad-center.nuspec --output-directory chocolatey
          $nupkg = Get-ChildItem chocolatey\*.nupkg | Select-Object -First 1
          choco push $nupkg.FullName --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}

  publish-winget:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release/

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Compute installer checksum
        id: checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem release/Squad-Center-Setup-*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash
          echo "SHA256=$hash" >> $env:GITHUB_OUTPUT

      - name: Update and validate winget manifest
        shell: pwsh
        run: |
          .\winget\update.ps1 -Version "${{ steps.version.outputs.VERSION }}" -Sha256 "${{ steps.checksum.outputs.SHA256 }}"
          winget validate --manifest .\winget\jmanuelcorral.SquadCenter --disable-interactivity
          if ($LASTEXITCODE -ne 0) {
            throw "winget validate failed with exit code $LASTEXITCODE"
          }

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Check winget package status
        id: winget_status
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packagePath = 'manifests/j/jmanuelcorral/SquadCenter'
          $headers = @{ 'User-Agent' = 'jmanuelcorral/squadcenter-release' }
          $response = Invoke-WebRequest `
            -Uri "https://api.github.com/repos/microsoft/winget-pkgs/contents/$packagePath" `
            -Headers $headers `
            -SkipHttpErrorCheck

          if ($response.StatusCode -eq 200) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
            Write-Host "winget package already exists; using wingetcreate update."
          } elseif ($response.StatusCode -eq 404) {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
            Write-Host "winget package does not exist yet; submitting local manifest as the initial package."
          } else {
            throw "Unable to determine winget package status. GitHub API returned $($response.StatusCode)."
          }

      - name: Submit winget manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageId = 'jmanuelcorral.SquadCenter'
          $version = "${{ steps.version.outputs.VERSION }}"
          $url = "https://github.com/jmanuelcorral/squadcenter/releases/download/v${version}/Squad-Center-Setup-${version}.exe"
          $manifestPath = Join-Path $PWD 'winget\jmanuelcorral.SquadCenter'

          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "WINGET_TOKEN is required. Create a GitHub PAT with repo/public_repo access, an expiration of 90 days or less, and SSO authorization for microsoft/winget-pkgs."
          }

          if ("${{ steps.winget_status.outputs.EXISTS }}" -eq 'true') {
            .\wingetcreate.exe update $packageId `
              --version $version `
              --urls $url `
              --submit `
              --token $env:WINGET_TOKEN `
              --no-open `
              --prtitle "$packageId version $version"
          } else {
            .\wingetcreate.exe submit $manifestPath `
              --token $env:WINGET_TOKEN `
              --no-open `
              --prtitle "New package: $packageId version $version"
          }

          if ($LASTEXITCODE -ne 0) {
            throw "wingetcreate failed. If the error mentions Microsoft Open Source PAT lifetime policy or SAML SSO, rotate WINGET_TOKEN to a GitHub PAT with an expiration of 90 days or less and authorize SSO for microsoft/winget-pkgs."
          }
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}

  publish-apt:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build apt repository
        run: |
          chmod +x apt-repo/setup.sh
          VERSION=${{ steps.version.outputs.VERSION }} ./apt-repo/setup.sh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/apt-deploy
          destination_dir: .
          keep_files: false
